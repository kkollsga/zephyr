<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 780" font-family="'SF Mono', 'Menlo', 'Monaco', 'Courier New', monospace">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <clipPath id="windowClip">
      <rect x="40" y="30" width="1120" height="720" rx="12"/>
    </clipPath>
    <linearGradient id="tabBarGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a3a3a"/>
      <stop offset="100%" stop-color="#2e2e2e"/>
    </linearGradient>
  </defs>

  <!-- Backdrop -->
  <rect width="1200" height="780" fill="#0d1117" rx="0"/>

  <!-- Window shadow -->
  <rect x="40" y="30" width="1120" height="720" rx="12" fill="#111" filter="url(#shadow)"/>

  <!-- Window content clipped -->
  <g clip-path="url(#windowClip)">

    <!-- Tab bar (single row with traffic lights + tabs + title) -->
    <rect x="40" y="30" width="1120" height="38" fill="url(#tabBarGrad)"/>
    <!-- Bottom border -->
    <line x1="40" y1="67" x2="1160" y2="67" stroke="#444444" stroke-width="1"/>

    <!-- Traffic lights -->
    <circle cx="62" cy="49" r="6.5" fill="#ff5f57"/>
    <circle cx="82" cy="49" r="6.5" fill="#febc2e"/>
    <circle cx="102" cy="49" r="6.5" fill="#28c840"/>

    <!-- Active tab (after traffic light padding ~120px) -->
    <rect x="120" y="30" width="150" height="44" rx="6" fill="#1e1e1e"/>
    <!-- Accent line -->
    <rect x="120" y="30" width="150" height="2" fill="#4ec9b0"/>
    <text x="134" y="54" fill="#d4d4d4" font-size="12" font-family="'SF Pro Text', 'Helvetica Neue', sans-serif">main.go</text>
    <text x="254" y="54" fill="#8c8c8c" font-size="10">×</text>

    <!-- Tab separator -->
    <line x1="272" y1="38" x2="272" y2="60" stroke="#444" stroke-width="1"/>

    <!-- Tab 2 (inactive) -->
    <text x="284" y="54" fill="#8c8c8c" font-size="12" font-family="'SF Pro Text', 'Helvetica Neue', sans-serif">fibonacci.go</text>
    <circle cx="382" cy="50" r="3.5" fill="#c8b464"/>

    <!-- Tab separator -->
    <line x1="394" y1="38" x2="394" y2="60" stroke="#444" stroke-width="1"/>

    <!-- Tab 3 (inactive) -->
    <text x="406" y="54" fill="#8c8c8c" font-size="12" font-family="'SF Pro Text', 'Helvetica Neue', sans-serif">render.go</text>
    <text x="488" y="54" fill="#8c8c8c" font-size="10">×</text>

    <!-- Plus button -->
    <text x="514" y="55" fill="#969696" font-size="17" font-family="'SF Pro Text', 'Helvetica Neue', sans-serif">+</text>

    <!-- App title and subtitle -->
    <text x="548" y="54" fill="#a0a0a0" font-size="12">Zephyr</text>
    <text x="604" y="54" fill="#5a5a5a" font-size="12">The caffeinated editor</text>

    <!-- Theme toggle (moon icon placeholder) -->
    <circle cx="1130" cy="49" r="6" fill="none" stroke="#5a5a5a" stroke-width="1.5"/>
    <circle cx="1133" cy="46" r="5" fill="url(#tabBarGrad)"/>

    <!-- Editor area -->
    <rect x="40" y="68" width="1120" height="614" fill="#1e1e1e"/>

    <!-- Gutter -->
    <rect x="40" y="68" width="52" height="614" fill="#1c1c1c"/>
    <line x1="92" y1="68" x2="92" y2="682" stroke="#323232" stroke-width="1"/>

    <!-- Line numbers -->
    <text fill="#6e6e6e" font-size="13" text-anchor="end">
      <tspan x="84" y="90">1</tspan>
      <tspan x="84" y="110">2</tspan>
      <tspan x="84" y="130">3</tspan>
      <tspan x="84" y="150">4</tspan>
      <tspan x="84" y="170">5</tspan>
      <tspan x="84" y="190">6</tspan>
      <tspan x="84" y="210">7</tspan>
      <tspan x="84" y="230">8</tspan>
      <tspan x="84" y="250">9</tspan>
      <tspan x="84" y="270">10</tspan>
      <tspan x="84" y="290">11</tspan>
      <tspan x="84" y="310">12</tspan>
      <tspan x="84" y="330">13</tspan>
      <tspan x="84" y="350">14</tspan>
      <tspan x="84" y="370">15</tspan>
      <tspan x="84" y="390">16</tspan>
      <tspan x="84" y="410">17</tspan>
      <tspan x="84" y="430">18</tspan>
      <tspan x="84" y="450">19</tspan>
      <tspan x="84" y="470">20</tspan>
      <tspan x="84" y="490">21</tspan>
      <tspan x="84" y="510">22</tspan>
      <tspan x="84" y="530">23</tspan>
      <tspan x="84" y="550">24</tspan>
      <tspan x="84" y="570">25</tspan>
      <tspan x="84" y="590">26</tspan>
      <tspan x="84" y="610">27</tspan>
      <tspan x="84" y="630">28</tspan>
      <tspan x="84" y="650">29</tspan>
      <tspan x="84" y="670">30</tspan>
    </text>

    <!-- Line highlight on line 10 -->
    <rect x="92" y="254" width="1068" height="20" fill="#282828"/>

    <!-- Code content — Go syntax highlighted -->
    <!-- Line 1: package main -->
    <text y="90" font-size="13">
      <tspan x="104" fill="#c586c0">package</tspan>
      <tspan fill="#d4d4d4"> main</tspan>
    </text>

    <!-- Line 3: import ( -->
    <text y="130" font-size="13">
      <tspan x="104" fill="#c586c0">import</tspan>
      <tspan fill="#d4d4d4"> (</tspan>
    </text>

    <!-- Line 4: "fmt" -->
    <text y="150" font-size="13">
      <tspan x="128" fill="#ce9178">"fmt"</tspan>
    </text>

    <!-- Line 5: "math" -->
    <text y="170" font-size="13">
      <tspan x="128" fill="#ce9178">"math"</tspan>
    </text>

    <!-- Line 6: "strings" -->
    <text y="190" font-size="13">
      <tspan x="128" fill="#ce9178">"strings"</tspan>
    </text>

    <!-- Line 7: ) -->
    <text x="104" y="210" fill="#d4d4d4" font-size="13">)</text>

    <!-- Line 9: // fibonacci comment -->
    <text x="104" y="250" fill="#6a9955" font-size="13">// fibonacci returns the nth Fibonacci number using dynamic programming.</text>

    <!-- Line 10: func fibonacci(n int) int { -->
    <text y="270" font-size="13">
      <tspan x="104" fill="#c586c0">func</tspan>
      <tspan fill="#dcdcaa"> fibonacci</tspan>
      <tspan fill="#d4d4d4">(</tspan>
      <tspan fill="#9cdcfe">n</tspan>
      <tspan fill="#d4d4d4"> </tspan>
      <tspan fill="#4ec9b0">int</tspan>
      <tspan fill="#d4d4d4">) </tspan>
      <tspan fill="#4ec9b0">int</tspan>
      <tspan fill="#d4d4d4"> {</tspan>
    </text>

    <!-- Line 11: if n <= 1 { -->
    <text y="290" font-size="13">
      <tspan x="128" fill="#c586c0">if</tspan>
      <tspan fill="#9cdcfe"> n</tspan>
      <tspan fill="#d4d4d4"> &lt;= </tspan>
      <tspan fill="#b5cea8">1</tspan>
      <tspan fill="#d4d4d4"> {</tspan>
    </text>

    <!-- Line 12: return n -->
    <text y="310" font-size="13">
      <tspan x="152" fill="#c586c0">return</tspan>
      <tspan fill="#9cdcfe"> n</tspan>
    </text>

    <!-- Line 13: } -->
    <text x="128" y="330" fill="#d4d4d4" font-size="13">}</text>

    <!-- Line 14: a, b := 0, 1 -->
    <text y="350" font-size="13">
      <tspan x="128" fill="#9cdcfe">a</tspan>
      <tspan fill="#d4d4d4">, </tspan>
      <tspan fill="#9cdcfe">b</tspan>
      <tspan fill="#d4d4d4"> := </tspan>
      <tspan fill="#b5cea8">0</tspan>
      <tspan fill="#d4d4d4">, </tspan>
      <tspan fill="#b5cea8">1</tspan>
    </text>

    <!-- Line 15: for i := 2; i <= n; i++ { -->
    <text y="370" font-size="13">
      <tspan x="128" fill="#c586c0">for</tspan>
      <tspan fill="#9cdcfe"> i</tspan>
      <tspan fill="#d4d4d4"> := </tspan>
      <tspan fill="#b5cea8">2</tspan>
      <tspan fill="#d4d4d4">; </tspan>
      <tspan fill="#9cdcfe">i</tspan>
      <tspan fill="#d4d4d4"> &lt;= </tspan>
      <tspan fill="#9cdcfe">n</tspan>
      <tspan fill="#d4d4d4">; </tspan>
      <tspan fill="#9cdcfe">i</tspan>
      <tspan fill="#d4d4d4">++ {</tspan>
    </text>

    <!-- Line 16: a, b = b, a+b -->
    <text y="390" font-size="13">
      <tspan x="152" fill="#9cdcfe">a</tspan>
      <tspan fill="#d4d4d4">, </tspan>
      <tspan fill="#9cdcfe">b</tspan>
      <tspan fill="#d4d4d4"> = </tspan>
      <tspan fill="#9cdcfe">b</tspan>
      <tspan fill="#d4d4d4">, </tspan>
      <tspan fill="#9cdcfe">a</tspan>
      <tspan fill="#d4d4d4">+</tspan>
      <tspan fill="#9cdcfe">b</tspan>
    </text>

    <!-- Line 17: } -->
    <text x="128" y="410" fill="#d4d4d4" font-size="13">}</text>

    <!-- Line 18: return b -->
    <text y="430" font-size="13">
      <tspan x="128" fill="#c586c0">return</tspan>
      <tspan fill="#9cdcfe"> b</tspan>
    </text>

    <!-- Line 19: } -->
    <text x="104" y="450" fill="#d4d4d4" font-size="13">}</text>

    <!-- Line 21: // isPrime comment -->
    <text x="104" y="490" fill="#6a9955" font-size="13">// isPrime checks if a number is prime.</text>

    <!-- Line 22: func isPrime -->
    <text y="510" font-size="13">
      <tspan x="104" fill="#c586c0">func</tspan>
      <tspan fill="#dcdcaa"> isPrime</tspan>
      <tspan fill="#d4d4d4">(</tspan>
      <tspan fill="#9cdcfe">n</tspan>
      <tspan fill="#d4d4d4"> </tspan>
      <tspan fill="#4ec9b0">int</tspan>
      <tspan fill="#d4d4d4">) </tspan>
      <tspan fill="#4ec9b0">bool</tspan>
      <tspan fill="#d4d4d4"> {</tspan>
    </text>

    <!-- Line 23: if n < 2 { -->
    <text y="530" font-size="13">
      <tspan x="128" fill="#c586c0">if</tspan>
      <tspan fill="#9cdcfe"> n</tspan>
      <tspan fill="#d4d4d4"> &lt; </tspan>
      <tspan fill="#b5cea8">2</tspan>
      <tspan fill="#d4d4d4"> {</tspan>
    </text>

    <!-- Line 24: return false -->
    <text y="550" font-size="13">
      <tspan x="152" fill="#c586c0">return</tspan>
      <tspan fill="#4ec9b0"> false</tspan>
    </text>

    <!-- Line 25: } -->
    <text x="128" y="570" fill="#d4d4d4" font-size="13">}</text>

    <!-- Line 26: for i := 2; ... -->
    <text y="590" font-size="13">
      <tspan x="128" fill="#c586c0">for</tspan>
      <tspan fill="#9cdcfe"> i</tspan>
      <tspan fill="#d4d4d4"> := </tspan>
      <tspan fill="#b5cea8">2</tspan>
      <tspan fill="#d4d4d4">; </tspan>
      <tspan fill="#9cdcfe">i</tspan>
      <tspan fill="#d4d4d4"> &lt;= </tspan>
      <tspan fill="#4ec9b0">int</tspan>
      <tspan fill="#d4d4d4">(</tspan>
      <tspan fill="#9cdcfe">math</tspan>
      <tspan fill="#d4d4d4">.</tspan>
      <tspan fill="#dcdcaa">Sqrt</tspan>
      <tspan fill="#d4d4d4">(</tspan>
      <tspan fill="#dcdcaa">float64</tspan>
      <tspan fill="#d4d4d4">(</tspan>
      <tspan fill="#9cdcfe">n</tspan>
      <tspan fill="#d4d4d4">))); </tspan>
      <tspan fill="#9cdcfe">i</tspan>
      <tspan fill="#d4d4d4">++ {</tspan>
    </text>

    <!-- Line 27: if n%i == 0 { -->
    <text y="610" font-size="13">
      <tspan x="152" fill="#c586c0">if</tspan>
      <tspan fill="#9cdcfe"> n</tspan>
      <tspan fill="#d4d4d4">%</tspan>
      <tspan fill="#9cdcfe">i</tspan>
      <tspan fill="#d4d4d4"> == </tspan>
      <tspan fill="#b5cea8">0</tspan>
      <tspan fill="#d4d4d4"> {</tspan>
    </text>

    <!-- Line 28: return false -->
    <text y="630" font-size="13">
      <tspan x="176" fill="#c586c0">return</tspan>
      <tspan fill="#4ec9b0"> false</tspan>
    </text>

    <!-- Line 29: } -->
    <text x="152" y="650" fill="#d4d4d4" font-size="13">}</text>

    <!-- Line 30: } -->
    <text x="128" y="670" fill="#d4d4d4" font-size="13">}</text>

    <!-- Cursor on line 10 -->
    <rect x="314" y="257" width="2" height="16" fill="#d4d4d4"/>

    <!-- Scrollbar -->
    <rect x="1148" y="74" width="8" height="170" rx="4" fill="#646464" opacity="0.7"/>

    <!-- Status bar -->
    <rect x="40" y="682" width="1120" height="38" fill="#191919"/>
    <line x1="40" y1="682" x2="1160" y2="682" stroke="#2d2d2d" stroke-width="1"/>
    <text y="706" font-size="11.5" font-family="'SF Pro Text', 'Helvetica Neue', sans-serif">
      <tspan x="56" fill="#969696">10:26</tspan>
      <tspan x="1100" fill="#4ec9b0">Go</tspan>
    </text>

  </g>

  <!-- Window border -->
  <rect x="40" y="30" width="1120" height="720" rx="12" fill="none" stroke="#444" stroke-width="0.5"/>
</svg>
