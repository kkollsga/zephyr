name: zephyr
arch: amd64
platform: linux
version: "${NFPM_VERSION}"
section: editors
priority: optional
maintainer: "Kristian Kollsgard"
description: |
  Zephyr — The caffeinated editor.
  A fast, GPU-accelerated text editor powered by Gio and Tree-sitter.
vendor: kkollsga
homepage: https://github.com/kkollsga/zephyr
license: MIT

depends:
  - libc6
  - libx11-6 | libwayland-client0
  - libgles2
  - libegl1

contents:
  - src: ./zephyr
    dst: /usr/bin/zephyr
    file_info:
      mode: 0755

  - src: ./build/linux/zephyr.desktop
    dst: /usr/share/applications/zephyr.desktop

  - src: ./assets/icon.svg
    dst: /usr/share/icons/hicolor/scalable/apps/zephyr.svg

  - src: ./assets/zephyr-256.png
    dst: /usr/share/icons/hicolor/256x256/apps/zephyr.png

  - src: ./LICENSE
    dst: /usr/share/doc/zephyr/copyright
