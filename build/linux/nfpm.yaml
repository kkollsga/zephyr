name: zephyr
arch: amd64
platform: linux
version: "${NFPM_VERSION}"
section: editors
priority: optional
maintainer: "Kristian Kollsgard"
description: |
  Zephyr — The caffeinated editor.
  A fast, GPU-accelerated text editor powered by Gio and Tree-sitter.
vendor: kristianweb
homepage: https://github.com/kristianweb/zephyr
license: MIT

depends:
  - libc6
  - libx11-6 | libwayland-client0
  - libgles2
  - libegl1

contents:
  - src: ../../zephyr
    dst: /usr/bin/zephyr
    file_info:
      mode: 0755

  - src: ./zephyr.desktop
    dst: /usr/share/applications/zephyr.desktop

  - src: ../../assets/icon.iconset/icon_256x256.png
    dst: /usr/share/icons/hicolor/256x256/apps/zephyr.png

  - src: ../../assets/icon.iconset/icon_128x128.png
    dst: /usr/share/icons/hicolor/128x128/apps/zephyr.png

  - src: ../../assets/icon.iconset/icon_32x32.png
    dst: /usr/share/icons/hicolor/32x32/apps/zephyr.png

  - src: ../../assets/icon.iconset/icon_16x16.png
    dst: /usr/share/icons/hicolor/16x16/apps/zephyr.png

  - src: ../../assets/icon.svg
    dst: /usr/share/icons/hicolor/scalable/apps/zephyr.svg

  - src: ../../LICENSE
    dst: /usr/share/doc/zephyr/copyright
